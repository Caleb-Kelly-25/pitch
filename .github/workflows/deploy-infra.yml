name: Deploy Infrastructure

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infrastructure/terraform

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_docdb_username: ${{secrets.docdb_username}}

      TF_VAR_docdb_password: ${{secrets.docdb_password}}

      TF_VAR_client_origin: ${{env.client_origin}}

      TF_VAR_ecs_task_family: ${{env.ecs_task_family}}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -upgrade

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -lock-timeout=2m -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan